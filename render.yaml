services:
  - type: web
    name: creator-portal
    runtime: docker
    dockerfilePath: ./apps/portal/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - fromGroup: creator commerce

  - type: web
    name: creator-admin
    runtime: docker
    dockerfilePath: ./apps/admin/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - fromGroup: creator commerce

  - type: web
    name: design-engine
    runtime: docker
    dockerfilePath: ./design-engine/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - fromGroup: creator commerce
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: EMBED_SHARED_KEY
        sync: false
